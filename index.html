<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>welcome.</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <section class="welcome">
    <h1 onclick="goAbout()">welcome.</h1>
  </section>

  <section class="about">

    <div class="video-screen">
      <video
        id="introVideo"
        src="video1.mp4"
        muted
        playsinline
        loop
        preload="auto">
      </video>
    </div>

    <div class="slider">

      <div class="panel intro">
        <div class="detail-menu">
          <a href="./input.html">Input</a>
          <a href="./dandelion.html">dandelion</a>
          <a href="./untitled.html">untitled</a>
        </div>

        <h2>about.</h2>
      </div>

      <div class="panel content">

        <div class="top-info fade-up">
          <p class="school">Hongik Univ.</p>
          <p class="dept">Department of Liberal Studies</p>
        </div>

        <div class="main-info fade-up">
          <p class="desc">
            미래에 직접 만든 툴로 제약분야에서 종사하고 싶습니다.
          </p>

          <p class="lang">
            I use <a href="./python.html">Python</a>.
          </p>
        </div>

      </div>

    </div>

  </section>

  <script>
    const intro = document.querySelector('.intro');
    const content = document.querySelector('.content');
    const slider = document.querySelector('.slider');
    const videoScreen = document.querySelector('.video-screen');
    const video = document.querySelector('#introVideo');

    let isOpen = false;

    window.addEventListener('load', () => {
      video.load();
      video.currentTime = 0.01;
    });

    function goAbout() {
      const about = document.querySelector('.about');

      about.scrollIntoView({
        behavior: 'smooth'
      });

      setTimeout(() => {
        videoScreen.classList.add('show');

        video.currentTime = 0.01;
        video.play().catch(error => {
          console.log('video play failed:', error);
        });

        setTimeout(() => {
          slider.classList.add('show');
        }, 2000);

        setTimeout(() => {
          intro.style.transform = 'translateX(33vw)';
          intro.classList.add('open');
          content.style.opacity = '1';
          isOpen = true;
        }, 3000);

      }, 800);
    }

    intro.onclick = function() {
      if (!isOpen) {
        intro.style.transform = 'translateX(33vw)';
        intro.classList.add('open');
        content.style.opacity = '1';
      } else {
        intro.style.transform = 'translateX(0)';
        intro.classList.remove('open');
        content.style.opacity = '0';
      }

      isOpen = !isOpen;
    };

    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          entry.target.classList.add('show');
        }
      });
    });

    document.querySelectorAll('.fade-up').forEach(el => {
      observer.observe(el);
    });
  </script>

</body>
</html>
