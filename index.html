<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>welcome.</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <section class="welcome">
    <h1 onclick="goAbout()">welcome.</h1>
  </section>

  <section class="about" id="about">

    <!-- 배경 영상 -->
    <div class="video-screen">
      <video
        id="introVideo"
        src="video1.mp4"
        muted
        autoplay
        playsinline
        loop
        preload="auto">
      </video>
    </div>

    <!-- about / 메뉴 / 자기소개 레이어 -->
    <div class="slider">

      <div class="detail-menu">
        <a href="./input.html">Input</a>
        <a href="./dandelion.html">dandelion</a>
        <a href="./untitled.html">untitled</a>
      </div>

      <div class="panel intro">
        <h2>about.</h2>
      </div>

      <div class="panel content">

        <div class="top-info">
          <p class="school">Hongik Univ.</p>
          <p class="dept">Department of Liberal Studies</p>
        </div>

        <div class="main-info">
          <p class="desc">
            미래에 직접 만든 툴로 제약분야에서 종사하고 싶습니다.
          </p>

          <p class="lang">
            I use <a href="./python.html">Python</a>.
          </p>
        </div>

      </div>

    </div>

  </section>

  <script>
    const about = document.querySelector('.about');
    const intro = document.querySelector('.intro');
    const video = document.querySelector('#introVideo');

    let hasStarted = false;

    function goAbout() {
      about.scrollIntoView({
        behavior: 'smooth'
      });

      video.play().catch(error => {
        console.log('video play failed:', error);
      });

      if (hasStarted) return;
      hasStarted = true;

      // 영상 배경 바로 노출
      about.classList.add('started');

      // 2초 뒤 about. 등장
      setTimeout(() => {
        about.classList.add('text-visible');
      }, 2000);

      // about. 등장 1초 뒤 자동 오픈
      setTimeout(() => {
        about.classList.add('open');
      }, 3000);
    }

    intro.addEventListener('click', () => {
      if (!about.classList.contains('text-visible')) return;
      about.classList.toggle('open');
    });
  </script>

</body>
</html>
